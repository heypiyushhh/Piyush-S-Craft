<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 120" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e7c4" />
      <stop offset="50%" stop-color="#c6a355" />
      <stop offset="100%" stop-color="#8e6d2f" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3c72" />
      <stop offset="100%" stop-color="#0b2240" />
    </linearGradient>
  </defs>
  <!-- Icon Group -->
  <g transform="translate(10, 10)">
    <!-- Hexagonal outer frame -->
    <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="url(#blueGrad)" stroke="url(#goldGrad)" stroke-width="3.5" />
    <!-- Stylized "S" / "C" curves -->
    <path d="M50,22 C37,22 28,30 28,45 C28,58 37,62 50,62 C63,62 72,66 72,78 C72,88 63,95 50,95" fill="none" stroke="url(#goldGrad)" stroke-width="7" stroke-linecap="round" />
    <!-- Central decorative node -->
    <circle cx="50" cy="50" r="5" fill="#ffffff" />
  </g>
  <!-- Text Group -->
  <text x="130" y="55" font-family="'Montserrat', 'Inter', sans-serif" font-weight="900" font-size="30" fill="#ffffff" letter-spacing="2">PIYUSH</text>
  <text x="130" y="88" font-family="'Montserrat', 'Inter', sans-serif" font-weight="700" font-size="20" fill="url(#goldGrad)" letter-spacing="4">S-CRAFT SOLUTION</text>
</svg>
